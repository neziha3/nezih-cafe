<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
  <title>Nezih Cafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
</head>
<body class="index-html">

  <div class="sol-arka-plan"></div>

  <div class="sag-icerik">
    
    <div id="logo">
      <a href="index.html">
        <img src="logo.png" alt="Logo">
      </a>
    </div>

    <div class="sarikutu2">
      <h1 id="yazi">Welcome to Nezih Cafe!</h1>
      <p>
        Nezih Cafe awaits you with its peaceful atmosphere and fresh flavors.
We are here to brighten your day with our friendly service.
      </p>
    </div>

    <div id="butonlar">
      <a href="menü.html" class="btn-gönder">Menu</a>
      <a href="iletişim.html" class="btn-gönder">contact</a>
    </div>

    <div class="sarikutu2">
      <h2 id="tavsiye">Today's Special⭐</h2>
      <ul>
        <li>Vanilla Latte + Cheesecake→ <strong>9$</strong></li>
        <li>Brownie + Tea → <strong>5$</strong></li>
      </ul>
    </div>

  </div>

  <script>
    const yazi = document.getElementById("tavsiye");
    let buyuyor = true;

    setInterval(() => {
      yazi.style.transform = buyuyor ? "scale(1.1)" : "scale(1)";
      buyuyor = !buyuyor;
    }, 500);
